<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculator Form</title>
</head>
<body>

<h2>Calculator</h2>

<form th:action="@{/calculatorform}" th:object="${calculatorData}" method="post">

    <label>Number 1:</label>
    <input type="number" step="any" th:field="*{number1}" />
    <br>

    <label>Number 2:</label>
    <input type="number" step="any" th:field="*{number2}" />
    <br>

    <label>Operation:</label>
    <select th:field="*{operation}">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>
    <br>

    <button type="submit">Calculate</button>

</form>

<a th:href="@{/}">Back to home</a>

</body>
</html>
