<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Palindrome Form</title>
</head>
<body>

<h2>Check palindrome</h2>

<form th:action="@{/palindromeform}" th:object="${palindromeData}" method="post">
    <label>Word:</label>
    <input type="text" th:field="*{word}" />
    <button type="submit">Check</button>

    <div th:if="${#fields.hasErrors('word')}"
         th:errors="*{word}"
         style="color:#b00020; margin-top:6px; font-size:0.95em;">
    </div>
</form>

<a href="/">Back to home</a>

</body>
</html>
